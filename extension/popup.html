<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      :root { color-scheme: light; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        width: 380px;
        margin: 0;
        padding: 14px;
        color: #111827;
        font-size: 13px;
      }
      h1 { font-size: 15px; margin: 0 0 2px; }
      .sub { color: #6b7280; margin: 0 0 12px; font-size: 12px; }
      label { display: block; font-weight: 500; margin: 8px 0 3px; font-size: 12px; }
      input, textarea {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        padding: 6px 8px;
        font-size: 12px;
        font-family: inherit;
      }
      textarea { resize: vertical; }
      .row { display: flex; gap: 8px; margin-top: 12px; }
      button {
        flex: 1;
        border: 0;
        border-radius: 6px;
        padding: 8px 10px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
      }
      .primary { background: #111827; color: #fff; }
      .secondary { background: #f3f4f6; color: #111827; }
      button:disabled { opacity: 0.6; cursor: default; }
      .results { margin-top: 12px; }
      .contact {
        border: 1px solid #e5e7eb;
        border-radius: 6px;
        padding: 8px;
        margin-bottom: 6px;
      }
      .contact .name { font-weight: 600; }
      .contact .meta { color: #6b7280; font-size: 11px; }
      .contact a { color: #2563eb; text-decoration: none; margin-right: 8px; font-size: 11px; }
      .muted { color: #6b7280; font-size: 12px; }
      .section-title { font-weight: 600; margin: 10px 0 4px; font-size: 12px; }
      details { margin-top: 12px; }
      summary { cursor: pointer; color: #6b7280; font-size: 11px; }
      .api { margin-top: 6px; }
    </style>
  </head>
  <body>
    <h1>ReferrAI</h1>
    <p class="sub">Captured from this page — edit if needed.</p>

    <label for="company">Company</label>
    <input id="company" type="text" placeholder="Company" />

    <label for="role">Role</label>
    <input id="role" type="text" placeholder="Job title / role" />

    <label for="jd">Job description</label>
    <textarea id="jd" rows="4" placeholder="Job description"></textarea>

    <div class="row">
      <button id="find" class="primary">Find contacts</button>
      <button id="open" class="secondary">Open in ReferrAI</button>
    </div>

    <div id="results" class="results"></div>

    <details>
      <summary>Settings</summary>
      <label for="apiBase" class="api">ReferrAI URL</label>
      <input id="apiBase" type="text" placeholder="http://localhost:3210" />
      <p class="muted">After changing this, also add the URL to the extension's host permissions.</p>
    </details>

    <script src="popup.js"></script>
  </body>
</html>
